
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Activos</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    .welcome-box {
        max-width: 700px;
        margin: 80px auto;
        padding: 60px;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(15px);
        border-radius: 28px;
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow:
            0 25px 50px rgba(15,23,42,0.15),
            0 10px 20px rgba(15,23,42,0.08);
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .welcome-box::before {
        content: "";
        position: absolute;
        top: -100px;
        right: -100px;
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, rgba(59,130,246,.2), transparent 70%);
    }

    .welcome-box::after {
        content: "";
        position: absolute;
        bottom: -120px;
        left: -120px;
        width: 280px;
        height: 280px;
        background: radial-gradient(circle, rgba(16,185,129,.15), transparent 70%);
    }

    .welcome-box h1 {
        font-size: 42px;
        color: #0f172a;
        margin-bottom: 15px;
        font-weight: 800;
        position: relative;
        z-index: 2;
    }

    .welcome-box p {
        color: #64748b;
        font-size: 18px;
        line-height: 1.8;
        max-width: 550px;
        margin: auto;
        position: relative;
        z-index: 2;
    }

    .buttons-group {
        margin-top: 45px;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        position: relative;
        z-index: 2;
    }

    .btn-main {
        min-width: 220px;
        padding: 16px 28px;
        border-radius: 16px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        transition: all .3s ease;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        letter-spacing: .3px;
    }

    .btn-login {
        color: white;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        box-shadow: 0 10px 25px rgba(37,99,235,.35);
    }

    .btn-login:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 35px rgba(37,99,235,.45);
    }

    .btn-register {
        color: white;
        background: linear-gradient(135deg, #10b981, #059669);
        box-shadow: 0 10px 25px rgba(16,185,129,.35);
    }

    .btn-register:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 35px rgba(16,185,129,.45);
    }

    @media (max-width: 768px) {
        .welcome-box {
            margin: 30px 15px;
            padding: 40px 25px;
        }

        .welcome-box h1 {
            font-size: 32px;
        }

        .buttons-group {
            flex-direction: column;
        }

        .btn-main {
            width: 100%;
        }
    }
</style>
</head>
<body>
    <div class="welcome-box">
    <h1>🚀 Sistema de Gestión de Activos Tecnológicos</h1>

    <p>
        Plataforma inteligente para el control, préstamo,
        trazabilidad y administración de equipos tecnológicos
        en laboratorios, aulas y áreas institucionales.
    </p>

    <div class="buttons-group">
        <a href="login.html" class="btn-main btn-login">
            🔐 Iniciar Sesión
        </a>

        <a href="registro.html" class="btn-main btn-register">
            ✨ Crear Cuenta
        </a>
    </div>
</div>
</body>
</html>
