<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Activos</title>
    <link rel="stylesheet" href="styles.css">
   <style>

    body{
        background: linear-gradient(135deg,#0f172a,#1e293b);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:30px;
    }

    .login-box{
        width:100%;
        max-width:480px;
        background:rgba(255,255,255,.98);
        backdrop-filter:blur(15px);
        padding:45px;
        border-radius:28px;
        border:1px solid rgba(255,255,255,.3);
        box-shadow:
            0 25px 50px rgba(0,0,0,.25),
            0 10px 25px rgba(0,0,0,.12);
        position:relative;
        overflow:hidden;
    }

    .login-box::before{
        content:'';
        position:absolute;
        top:-120px;
        right:-120px;
        width:260px;
        height:260px;
        border-radius:50%;
        background:rgba(59,130,246,.12);
    }

    .login-box::after{
        content:'';
        position:absolute;
        bottom:-120px;
        left:-120px;
        width:240px;
        height:240px;
        border-radius:50%;
        background:rgba(16,185,129,.10);
    }

    .login-box h2{
        text-align:center;
        color:#0f172a;
        margin-bottom:12px;
        border:none;
        padding:0;
        font-size:32px;
        font-weight:800;
        position:relative;
        z-index:2;
    }

    .login-box p{
        text-align:center;
        color:#64748b;
        margin-bottom:30px;
        position:relative;
        z-index:2;
    }

    .login-box form{
        display:flex;
        flex-direction:column;
        gap:18px;
        background:transparent !important;
        border:none !important;
        padding:0 !important;
        margin:0 !important;
        align-items:stretch !important;
        position:relative;
        z-index:2;
    }

    .login-box input{
        width:100%;
        padding:16px 18px;
        border:2px solid #e2e8f0;
        border-radius:14px;
        font-size:15px;
        background:#f8fafc;
        transition:all .3s ease;
    }

    .login-box input:hover{
        border-color:#94a3b8;
    }

    .login-box input:focus{
        border-color:#3b82f6;
        background:white;
        outline:none;
        box-shadow:0 0 0 5px rgba(59,130,246,.15);
        transform:translateY(-2px);
    }

    .login-box button{
        width:100%;
        padding:16px;
        border:none;
        border-radius:14px;
        color:white;
        font-size:16px;
        font-weight:700;
        cursor:pointer;
        background:linear-gradient(135deg,#2563eb,#1d4ed8);
        box-shadow:0 12px 25px rgba(37,99,235,.35);
        transition:all .3s ease;
    }

    .login-box button:hover{
        transform:translateY(-3px);
        box-shadow:0 18px 35px rgba(37,99,235,.45);
    }

    .login-box button:active{
        transform:translateY(0);
    }

    .btn-register-link{
        display:block;
        text-align:center;
        margin-top:25px;
        color:#16a34a;
        font-weight:700;
        text-decoration:none;
        transition:.3s;
        position:relative;
        z-index:2;
    }

    .btn-register-link:hover{
        color:#15803d;
    }

    .back-link{
        display:block;
        text-align:center;
        margin-top:15px;
        color:#64748b;
        text-decoration:none;
        transition:.3s;
        position:relative;
        z-index:2;
    }

    .back-link:hover{
        color:#334155;
    }

    .login-divider{
        display:flex;
        align-items:center;
        gap:12px;
        margin:25px 0;
        color:#94a3b8;
        font-size:13px;
        position:relative;
        z-index:2;
    }

    .login-divider::before,
    .login-divider::after{
        content:'';
        flex:1;
        height:1px;
        background:#e2e8f0;
    }

    @media(max-width:768px){

        body{
            padding:20px;
        }

        .login-box{
            padding:30px;
            border-radius:22px;
        }

        .login-box h2{
            font-size:26px;
        }

    }

</style>
</head>
<body>

    <div class="login-box">
        <h2>🔐 Iniciar Sesión</h2>

    <p>
        Accede al Sistema de Gestión de Activos Tecnológicos
    </p>
        <form id="formLogin">
            <input type="text" id="username" placeholder="Usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            
            <select id="rol" required style="display:none;">
                <option value="estudiante" selected>Estudiante / Usuario</option>
            </select>

            <button type="submit">Ingresar</button>
        </form>
        
        <a href="registro.html" class="btn-register-link">¿No tienes cuenta? Regístrate aquí</a>
        <br>
        <a href="index.html" style="display:block; text-align:center; color: #666;">Volver al inicio</a>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            try {
                // Petición al backend usando el proxy inverso /api
                const response = await fetch('/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: user, password: pass })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    alert(result.message);
                    
                    // Guardamos los datos de sesión en el navegador
                    localStorage.setItem('usuarioLogeado', result.usuario); 
                    localStorage.setItem('usuarioId', result.usuario_id);
                    localStorage.setItem('usuario_nombre', result.nombre); // Asegúrate de que tu API devuelva el nombre aquí
                    localStorage.setItem('rolUsuario', result.rol); // 'administrador' o 'estudiante'/'usuario'
                    localStorage.setItem('usuario_rol', result.rol); // Se estandariza para el control en paneles

                    // Redirección inteligente basada en el rol que devuelve la base de datos
                    // Ajusta la cadena de texto de acuerdo a cómo esté guardado el rol en tu BD (ej. 'administrador', 'admin', etc.)
                    const rolLlegada = (result.rol || '').toLowerCase();
                    
                    if (rolLlegada.includes('admin')) {
                        window.location.href = 'dashboard.html'; // Panel de administrador
                    } else {
                        window.location.href = 'usuario.html';   // Panel de usuario simplificado
                    }
                } else {
                    alert("Error: " + result.message);
                }

            } catch (error) {
                console.error("Error de conexión:", error);
                alert("No se pudo conectar con el servidor de autenticación.");
            }
        });
    </script>
</body>
</html>
