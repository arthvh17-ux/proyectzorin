version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db_activos
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sistema_activos
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_php
    volumes:
      - ./api:/var/www/html
    expose:
      - "80"
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: proxy_inverso
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/var/www/html/frontend
    depends_on:
      - api

volumes:
  db_data: